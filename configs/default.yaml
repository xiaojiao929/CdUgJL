dataset:
  name: LLD-MMRI
  root: ./data/LLD-MMRI
  modalities: [T2FS, DWI]
  label_ratio: 0.2
  input_size: [256, 256]
  num_classes: 2
  task: multi-task

training:
  batch_size: 4
  num_workers: 4
  epochs: 300
  optimizer: adamw
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  scheduler: cosine
  warmup_epochs: 10
  gradient_clip: 5.0

loss:
  seg_weight: 1.0
  distill_weight: 0.5
  evidence_weight: 0.3
  uncertainty_weight: 0.6
  contrastive_weight: 0.4
  contrastive_temperature: 0.07   # InfoNCE temperature
  kd_temperature: 2.0             # soft-label KD temperature (future use)
  beta: 0.6

model:
  backbone: meamt_net
  in_channels: 2
  base_channels: 64
  num_classes: 2
  quant_dim: 3
  use_edge_attention: true
  use_mamba: true
  use_evidence: true
  use_distillation: true

logging:
  log_dir: ./runs
  log_interval: 10
  eval_interval: 1
  save_interval: 50
  save_path: ./checkpoints

testing:
  checkpoint_path: ./checkpoints/meamtnet_best.pth
  batch_size: 1
  save_output: true
  output_dir: ./outputs
